<style>
        body { font-family: 'Inter', sans-serif; background-color: #fcf8f8; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md docked full-width top-0 sticky z-50 border-b border-slate-100 dark:border-slate-800 shadow-sm flex justify-between items-center w-full px-5 h-16">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity Active: scale-95 duration-150">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">close</span>
</button>
<h1 class="font-['Spline_Sans'] font-bold text-lg tracking-tight text-slate-900 dark:text-white">Wayta</h1>
</div>
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden border border-slate-100 dark:border-slate-800">
<img class="w-full h-full object-cover" data-alt="professional portrait of a young man with a friendly expression against a clean studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDR-2cFGxgqytjdMqYAXSO_igj9aFzlApMKk9FxD3bfvncnELnqn2srf1jtDtWWxtL2sD-VEv7R2YsFIqVcKab6-86I-WXws419fadlZBCwfLS4EmF1L8QCGnSYVq2w1er-KE9ewS9aqMrmGhSbXTuDv6GonYf2tFN-E8SUv2YsYWA6WVjC_KcRC_T4s-3C4E_DpCqA7pXHrvJ31nyzlvnfaCSenZGNUo-F5Apzq1RTWX9K8D0z4qsVoEUcWis3HuIq5mYJ_kMsSE"/>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-container-margin py-unit-lg max-w-2xl mx-auto w-full">
<div class="mb-unit-xl">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-unit-xs">Set A Budget</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Manage your festival spending effectively.</p>
</div>
<!-- Form Section with Bento-ish Layout -->
<form class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Category Selection -->
<div class="md:col-span-1 bg-white p-unit-md rounded-xl border border-surface-container-high shadow-sm hover:shadow-md transition-shadow">
<label class="font-label-bold text-label-bold text-on-surface-variant block mb-unit-sm" for="category">Category</label>
<div class="relative">
<select class="w-full h-touch-target-optimal rounded-lg border-surface-variant bg-surface-container-low text-on-surface focus:ring-primary focus:border-primary px-unit-md appearance-none" id="category">
<option value="Drinks">Drinks</option>
<option value="Entrance">Entrance</option>
<option value="Food">Food</option>
<option value="Merchandise">Merchandise</option>
</select>
<span class="material-symbols-outlined absolute right-unit-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<!-- Budget Input -->
<div class="md:col-span-1 bg-white p-unit-md rounded-xl border border-surface-container-high shadow-sm hover:shadow-md transition-shadow">
<label class="font-label-bold text-label-bold text-on-surface-variant block mb-unit-sm" for="budget">Budget</label>
<div class="relative flex items-center">
<span class="absolute left-unit-md font-label-bold text-lg text-primary">R</span>
<input class="w-full h-touch-target-optimal pl-unit-xl pr-unit-md rounded-lg border-surface-variant bg-surface-container-low text-on-surface focus:ring-primary focus:border-primary font-headline-md" id="budget" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Location Dropdown -->
<div class="md:col-span-2 bg-white p-unit-md rounded-xl border border-surface-container-high shadow-sm hover:shadow-md transition-shadow">
<label class="font-label-bold text-label-bold text-on-surface-variant block mb-unit-sm" for="location">Venue / Location</label>
<div class="relative">
<select class="w-full h-touch-target-optimal rounded-lg border-surface-variant bg-surface-container-low text-on-surface focus:ring-primary focus:border-primary px-unit-md appearance-none" id="location">
<option value="Main Stage Arena">Main Stage Arena</option>
<option value="Neon Gardens">Neon Gardens</option>
<option value="Electric Avenue">Electric Avenue</option>
<option value="The Oasis VIP Lounge">The Oasis VIP Lounge</option>
</select>
<span class="material-symbols-outlined absolute right-unit-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">location_on</span>
</div>
</div>
<!-- Description Text Area -->
<div class="md:col-span-2 bg-white p-unit-md rounded-xl border border-surface-container-high shadow-sm hover:shadow-md transition-shadow">
<label class="font-label-bold text-label-bold text-on-surface-variant block mb-unit-sm" for="description">Description</label>
<textarea class="w-full rounded-lg border-surface-variant bg-surface-container-low text-on-surface focus:ring-primary focus:border-primary p-unit-md font-body-md" id="description" placeholder="What is this budget for? (e.g., Round of drinks for the group)" rows="4"></textarea>
</div>
<!-- Quick Suggestion Bento -->
<div class="md:col-span-2 grid grid-cols-3 gap-unit-sm">
<button class="bg-secondary-fixed text-on-secondary-fixed-variant p-unit-sm rounded-lg flex flex-col items-center justify-center text-center gap-1 hover:brightness-95 transition-all h-24" type="button">
<span class="material-symbols-outlined text-xl">local_bar</span>
<span class="text-[11px] font-bold uppercase tracking-tight">Round</span>
</button>
<button class="bg-tertiary-fixed text-on-tertiary-fixed-variant p-unit-sm rounded-lg flex flex-col items-center justify-center text-center gap-1 hover:brightness-95 transition-all h-24" type="button">
<span class="material-symbols-outlined text-xl">restaurant</span>
<span class="text-[11px] font-bold uppercase tracking-tight">Lunch</span>
</button>
<button class="bg-primary-fixed text-on-primary-fixed-variant p-unit-sm rounded-lg flex flex-col items-center justify-center text-center gap-1 hover:brightness-95 transition-all h-24" type="button">
<span class="material-symbols-outlined text-xl">confirmation_number</span>
<span class="text-[11px] font-bold uppercase tracking-tight">Access</span>
</button>
</div>
</form>
</main>
<!-- Footer Action Bar -->
<footer class="bg-white/95 dark:bg-slate-900/95 backdrop-blur-lg fixed bottom-0 w-full z-50 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]">
<div class="max-w-2xl mx-auto flex gap-unit-md p-unit-md">
<button class="flex-1 h-touch-target-optimal rounded-xl border-2 border-[#ff0099] text-[#ff0099] font-label-bold hover:bg-secondary-container/5 transition-all active:scale-95">
                Cancel
            </button>
<button class="flex-[2] h-touch-target-optimal rounded-xl bg-[#ccff00] text-[#1c1d00] font-label-bold shadow-md hover:shadow-lg hover:brightness-105 active:scale-95 transition-all flex items-center justify-center gap-2">
                Save Budget
                <span class="material-symbols-outlined">check_circle</span>
</button>
</div>
</footer>
<!-- Visual Anchor / Decorative Element -->
<div class="hidden lg:block fixed right-unit-xl top-1/2 -translate-y-1/2 w-64 h-96 pointer-events-none">
<div class="relative w-full h-full rounded-3xl overflow-hidden shadow-2xl border-4 border-white rotate-3">
<img class="w-full h-full object-cover" data-alt="vibrant music festival crowd at sunrise with orange and pink sky lighting high energy atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4rrflYRUkw5MV_Y1FMT53JrLqyW4J3C-3sak6fAOTlp42Nj1jAMgF00OITiJnaAXEXk-aPN3ZMJxx8ZDJtRrbj3l-YqRg6UdodtkMegElemmTmRfHX3vGOyrPi8arwqpCsPx_QbxfdMi5Ahfct3UEvSX8i8x6oWzTMohIh9E3AqIohs-dM_GLuUdf5vYF4K1tWwgzbIqo1ZWGWfks_gthEPK65I1Da6Z5a4BghJjb0Jjw2Mt0gR7C1CId3ESW1xlgmiaRjnVHSmw"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent flex flex-col justify-end p-unit-md">
<span class="text-white font-bold text-xs uppercase tracking-widest opacity-80">Next Event</span>
<h3 class="text-white font-display-xl text-headline-md leading-none">Electric Daybreak</h3>
</div>
</div>
</div>
<!-- Live Pulse Badge (Floating Decoration) -->
<div class="fixed top-20 right-5 z-40 bg-white/90 border border-surface-container-high rounded-full px-4 py-2 flex items-center gap-2 shadow-sm">
<span class="w-2 h-2 rounded-full bg-lime-400 pulse-lime"></span>
<span class="font-label-bold text-xs text-on-surface">Live Network</span>
</div>
</body></html>
