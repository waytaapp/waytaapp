<style>
        .loading-pulse {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
        .blur-backdrop {
            filter: blur(12px) saturate(1.8);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen overflow-hidden">
<!-- Blurred Background (Representative of Welcome Screen 37) -->
<div class="fixed inset-0 z-0 blur-backdrop scale-105">
<img alt="Festival Crowd" class="w-full h-full object-cover opacity-60" data-alt="dynamic outdoor music festival with vibrant neon stage lights, large crowd silhouetted against electric lime and pink daylight skies" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBGBJ3LBwDEW8Ad2SH9zx0h-tsrPWV3eULqb37Yf7RvEQ5vZmok552OYCrZc8unW5hfqYlAOJO6wWM5A1M9fn2czxFUpMPH4SWfhC3KqwkyjHl_ID8qmb1TbofbNH1E3cQCyty6LahHYJLz5NxEHUEC_v5xv66kW-R_j5Xqw4_PiQ-t7rptX7gQQJP37fX_-voV5RDob7GOsYfta014_Os04AjbEAFZVePk2vK2u-Xp2CFkTBGCpFNs22TqIWCUcy3Qj-ycElQNZ24"/>
<div class="absolute inset-0 bg-white/40"></div>
<!-- Blurred UI Elements to mimic the underlying screen -->
<div class="absolute inset-x-0 bottom-20 px-8 space-y-4">
<div class="h-16 bg-white/80 rounded-xl w-full"></div>
<div class="h-14 bg-lime-400/80 rounded-xl w-full"></div>
</div>
<div class="absolute top-20 left-8">
<div class="h-12 w-48 bg-black/80 rounded-lg mb-2"></div>
<div class="h-6 w-32 bg-black/40 rounded-lg"></div>
</div>
</div>
<!-- Main Loading Content -->
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen p-container-margin">
<!-- Loading Container -->
<div class="relative flex flex-col items-center">
<!-- Stylish Multi-Ring Spinner -->
<div class="relative w-24 h-24 flex items-center justify-center">
<!-- Inner Neon Pink Ring -->
<div class="absolute inset-0 border-4 border-secondary/20 rounded-full"></div>
<div class="absolute inset-0 border-4 border-t-secondary rounded-full animate-spin"></div>
<!-- Outer Electric Lime Pulse -->
<div class="absolute -inset-4 border-2 border-primary-container rounded-full loading-pulse opacity-60"></div>
<!-- Center Icon -->
<span class="material-symbols-outlined text-4xl text-on-background font-bold" data-icon="bolt">bolt</span>
</div>
<!-- Authenticating Text -->
<div class="mt-unit-xl text-center">
<h1 class="font-headline-md text-headline-md text-on-background tracking-tight">
                    Authenticating...
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-unit-xs">
                    Preparing your Electric Daybreak experience
                </p>
</div>
<!-- Live Pulse Badge (Mandatory Style Guidance) -->
<div class="mt-12 flex items-center gap-2 px-unit-md py-unit-sm bg-white/80 backdrop-blur-md rounded-full shadow-sm border border-slate-100">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<span class="font-label-bold text-label-bold text-on-background uppercase tracking-widest">Secure Link</span>
</div>
</div>
</main>
<!-- Connectivity Banner (Top Anchor) -->
<div class="fixed top-0 left-0 w-full z-50 bg-[#FFB800] px-unit-md py-2 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-black text-sm" data-icon="warning">warning</span>
<span class="font-status-banner text-status-banner text-black">Verifying connection stability...</span>
</div>
<!-- Hidden structure for TopAppBar styling preservation from JSON -->
<header class="hidden md:flex justify-between items-center w-full px-5 h-16 bg-white/90 backdrop-blur-md font-['Spline_Sans'] antialiased shadow-sm border-b border-slate-100">
<span class="text-2xl font-black italic tracking-tighter text-black">Wayta</span>
</header>
</body></html>
