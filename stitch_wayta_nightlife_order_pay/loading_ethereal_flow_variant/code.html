<style>
        body {
            background-color: #ffffff;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .iridescent-flare {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(204,255,0,0.15) 0%, rgba(255,0,255,0.1) 30%, rgba(0,255,255,0.05) 60%, rgba(255,255,255,0) 80%);
            filter: blur(80px);
            z-index: 1;
        }

        .glass-orb {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                inset 0 0 20px rgba(255, 255, 255, 0.4),
                0 10px 30px rgba(0, 0, 0, 0.05),
                0 0 40px rgba(204, 255, 0, 0.1);
            z-index: 10;
        }

        .orb-inner-shimmer {
            position: absolute;
            top: 15%;
            left: 15%;
            width: 30%;
            height: 30%;
            background: white;
            filter: blur(8px);
            border-radius: 50%;
            opacity: 0.6;
        }

        .loading-text {
            position: absolute;
            bottom: 64px;
            color: #2a2a2a;
            text-transform: uppercase;
            letter-spacing: 1.2em;
            width: 100%;
            text-align: center;
            z-index: 20;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<div class="iridescent-flare"></div>

<div class="glass-orb flex items-center justify-center">
<div class="orb-inner-shimmer"></div>
<!-- Subtle optical refraction lines -->
<div class="absolute inset-0 border border-black/5 rounded-full scale-110 blur-[1px]"></div>
</div>
<!-- Semantic Anchor (Invisible but present for structure) -->
<div class="mt-fragment-offset opacity-0">
<span class="font-label-mono text-glitch-sm">01 // INITIALIZING</span>
</div>
</div>
<!-- Loading Footer Text -->
<div class="loading-text">

        </h1>
