<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col items-center justify-center p-0 m-0">
<!-- Hero Background Image Section -->
<div class="fixed inset-0 z-0">
<img alt="Festival Background" class="w-full h-full object-cover grayscale-[20%] brightness-75" data-alt="vibrant music festival at sunrise with high energy crowds dancing and electric lime lighting effects" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdjIv0e0FI-7XTikGrgGY9JFdlIZV32gPCxdbjzGNy3TK18_xFsevsJiFerVvIhac4XSb2CH3S63jM-ibb5ZwfDfAVjje4v9-N2oeWOJoQJTO3Qm8zT1x2PYAurUlyK6LqA3fOwHxESvkFxbItexDGRiJuu1JziHZsJDKhaMeYUmX6Rli5fLzsa18LqsJhFJVjhvuS0dwWP4UBrV9SIlt6n-ro_hP8N6AuX9YX03l30ZzP2LYf74ETnamnw_y3hxwPIeHrWtOySr8"/>
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-white/40 to-white"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md mx-auto px-container-margin flex flex-col items-center justify-end min-h-screen pb-12">
<!-- Brand Identity Container -->
<div class="w-full mb-12 text-center">
<h1 class="font-display-xl text-display-xl tracking-tighter italic font-black text-black drop-shadow-md mb-2">
                Wayta
            </h1>
<p class="font-body-lg text-body-lg text-on-surface font-medium opacity-90">
                Experience the pulse of daybreak.
            </p>
</div>
<!-- Interactive Card Area -->
<div class="w-full space-y-unit-md">
<!-- GOOGLE SIGN IN BUTTON (Primary Action) -->
<button class="w-full h-[56px] bg-primary-container text-on-primary-container rounded-xl flex items-center justify-center gap-3 font-label-bold text-label-bold shadow-lg active:scale-95 transition-transform">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>

            </button>
<!-- ERROR ALERT CARD (The specific request) -->
<div class="w-full bg-error-container/90 backdrop-blur-glass border border-error/20 p-unit-md rounded-xl shadow-sm flex gap-unit-md items-start animate-pulse-subtle">
<div class="bg-error rounded-full p-1.5 flex-shrink-0">
<span class="material-symbols-outlined text-[20px] text-on-error" style="font-variation-settings: 'FILL' 1;">error</span>
</div>
<div class="flex-grow">
<p class="font-label-bold text-label-bold text-on-error-container mb-unit-sm">
                        Sign-in failed. Please check your connection and try again.
                    </p>
<button class="flex items-center gap-1 text-on-error-container font-label-bold text-label-bold underline decoration-2 underline-offset-4 hover:text-error transition-colors">
<span class="material-symbols-outlined text-[18px]">refresh</span>
                        Retry
                    </button>
</div>
</div>
<!-- SECONDARY ACTION -->
<button class="w-full h-[56px] border-2 border-secondary text-secondary rounded-xl font-label-bold text-label-bold hover:bg-secondary/5 transition-colors">
                Explore as Guest
            </button>
<!-- TERTIARY LINKS -->
<div class="flex justify-center gap-unit-lg pt-4">
<a class="font-label-bold text-[12px] text-on-surface-variant uppercase tracking-widest opacity-60 hover:opacity-100" href="#">Privacy Policy</a>
<a class="font-label-bold text-[12px] text-on-surface-variant uppercase tracking-widest opacity-60 hover:opacity-100" href="#">Terms of Service</a>
</div>
</div>
</main>
<!-- LIVE PULSE INDICATOR (Brand Requirement) -->
<div class="fixed top-6 right-6 z-50 flex items-center gap-2 bg-white/80 backdrop-blur-md px-3 py-1.5 rounded-full border border-slate-100 shadow-sm">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary-container opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<span class="font-label-bold text-[10px] uppercase tracking-tighter text-on-surface">Live Event Support</span>
</div>
<!-- OFFLINE STATUS BANNER (Brand Requirement - Hidden for UI context but ready) -->
<div class="hidden fixed top-0 left-0 w-full bg-[#FFB800] py-2 px-4 flex items-center justify-center gap-2 z-[60]">
<span class="material-symbols-outlined text-black">warning</span>
<span class="font-status-banner text-status-banner text-black uppercase tracking-tight">Offline: Connection unstable</span>
</div>
<!-- Navigation suppressed for Welcome screen as per "Semantic Shell Mandate" (Transactional/Onboarding focus) -->
